name: Android CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'EduAiApp/**'
      - '.github/workflows/android-build.yml'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./EduAiApp

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: EduAiApp-debug-apk
        path: EduAiApp/app/build/outputs/apk/debug/app-debug.apk
